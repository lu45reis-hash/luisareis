<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background 3</title>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: url('../imagens/background3.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: Arial, Helvetica, sans-serif;
            color: #ffffff;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .conteudo {
            background-color: rgba(0, 0, 0, 0.5);
            padding: 50px 80px;
            border-radius: 15px;
            max-width: 85%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
        }

        h1 {
            font-size: 3.8rem;
            margin: 0;
            text-shadow: 4px 4px 12px rgba(0, 0, 0, 0.9);
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="conteudo">
        <h1>Exemplo de background</h1>
    </div>

</body>
</html>
