<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background 1</title>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-image: url('../imagens/background4.jpg');
            background-size: cover;        /* cobre toda a tela */
            background-position: center;   /* centraliza a imagem */
            background-repeat: no-repeat;
            background-attachment: fixed;  /* opcional: imagem fixa ao rolar */
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }

        .conteudo {
            padding: 50px;
            color: white;                    /* mude conforme a cor do seu background */
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7); /* melhora legibilidade */
        }
    </style>
</head>

<body>

    <div class="conteudo">
        <h1>Exemplo de background</h1>
    </div>

</body>
</html>
