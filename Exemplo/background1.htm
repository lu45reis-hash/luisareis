<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background 1</title>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: url('../imagens/background1.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: Arial, Helvetica, sans-serif;
            color: #ffffff;           /* Cor do texto (branco) */
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .conteudo {
            background-color: rgba(0, 0, 0, 0.5); /* fundo semi-transparente para melhorar legibilidade */
            padding: 40px 60px;
            border-radius: 15px;
            max-width: 80%;
        }

        h1 {
            font-size: 3.5rem;
            margin: 0;
            text-shadow: 3px 3px 8px rgba(0, 0, 0, 0.8);
        }
    </style>
</head>

<body>

    <div class="conteudo">
        <h1>Exemplo de background</h1>
    </div>

</body>
</html>
