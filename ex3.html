<!doctype html>
<html lang="pt-PT">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Página 3</title>

  <meta name="description" content="Exercício de mapas de imagem - página de destino." />

  <style>
    :root{
      --bg1: #0f172a;   /* slate-900 */
      --bg2: #111827;   /* gray-900 */
      --card: rgba(255,255,255,.08);
      --border: rgba(255,255,255,.16);
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.72);
      --shadow: 0 18px 40px rgba(0,0,0,.35);
      --radius: 18px;
    }

    *{ box-sizing: border-box; }
    body{
      margin: 0;
      min-height: 100svh;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(900px 600px at 15% 10%, rgba(59,130,246,.25), transparent 60%),
        radial-gradient(900px 600px at 85% 90%, rgba(34,197,94,.18), transparent 55%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main{
      width: min(720px, 100%);
    }

    .card{
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px;
      backdrop-filter: blur(10px);
    }

    .badge{
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.10);
      border: 1px solid rgba(255,255,255,.14);
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 14px;
    }

    h1{
      margin: 0 0 10px;
      font-size: clamp(26px, 4vw, 34px);
      line-height: 1.15;
      letter-spacing: -0.02em;
    }

    p{
      margin: 0;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.5;
    }

    .actions{
      margin-top: 18px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn{
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.16);
      background: rgba(255,255,255,.10);
      color: var(--text);
      text-decoration: none;
      font-weight: 600;
      transition: transform .12s ease, background .12s ease, border-color .12s ease;
    }

    .btn:hover{
      transform: translateY(-1px);
      background: rgba(255,255,255,.14);
      border-color: rgba(255,255,255,.22);
    }

    .btn:focus-visible{
      outline: 3px solid rgba(59,130,246,.55);
      outline-offset: 3px;
    }

    footer{
      margin-top: 14px;
      text-align: center;
      color: rgba(255,255,255,.55);
      font-size: 13px;
    }

    /* Respeitar preferências de movimento reduzido */
    @media (prefers-reduced-motion: reduce){
      .btn{ transition: none; }
      .btn:hover{ transform: none; }
    }
  </style>
</head>

<body>
  <main>
    <section class="card" aria-labelledby="titulo">
      <div class="badge" aria-hidden="true">📍 Página 3</div>

      <h1 id="titulo">Acabaste de clicar na águia</h1>

      <p>
        Escolheste a ave preferida de muitos benfiquistas: <strong>a águia</strong>.
      </p>

      <div class="actions">
        <a class="btn" href="mapas.htm#1">⬅️ Voltar ao mapa</a>
        <a class="btn" href="index.html">🏠 Ir ao índice</a>
      </div>
    </section>

    <footer>
      Exercício de Image Maps (HTML5)
    </footer>
  </main>
</body>
</html>
